<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Line Connect — PDF Vector Inspector</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d0d0d; color: #ccc; font-family: system-ui, sans-serif; font-size: 13px;
       display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ── Toolbar ─────────────────────────────────────────────── */
#toolbar {
  background: #1a1a1a; border-bottom: 1px solid #333;
  display: flex; align-items: center; gap: 14px; padding: 8px 14px;
  flex-shrink: 0; flex-wrap: wrap;
}
#toolbar .title { font-weight: 700; font-size: 15px; color: #fff; letter-spacing: .04em; }
.sep { width: 1px; height: 22px; background: #333; }

.btn {
  background: #2a2a2a; border: 1px solid #444; color: #ccc; border-radius: 6px;
  padding: 4px 10px; cursor: pointer; font-size: 12px; white-space: nowrap;
  transition: background .12s;
}
.btn:hover { background: #383838; }
.btn.active { background: #1a6aaa; border-color: #2980d9; color: #fff; }

.ctl-group { display: flex; align-items: center; gap: 7px; }
.ctl-group label { color: #999; font-size: 11px; white-space: nowrap; }
input[type=range] {
  -webkit-appearance: none; width: 80px; height: 4px;
  background: #444; border-radius: 2px; outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 13px; height: 13px;
  border-radius: 50%; background: #2980d9; cursor: pointer;
}
.val { min-width: 34px; color: #eee; font-size: 11px; }
#status-right { margin-left: auto; color: #888; font-size: 11px; }

/* ── Main ─────────────────────────────────────────────────── */
#main { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ──────────────────────────────────────────────── */
#sidebar {
  width: 200px; flex-shrink: 0; background: #141414;
  border-right: 1px solid #2c2c2c; display: flex; flex-direction: column;
  overflow: hidden;
}
#sidebar h3 {
  font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
  color: #666; padding: 10px 12px 6px; flex-shrink: 0;
}
#layer-list { flex: 1; overflow-y: auto; padding: 4px 0; }
.layer-row {
  display: flex; align-items: center; gap: 8px; padding: 5px 12px;
  cursor: pointer; transition: background .1s; user-select: none;
}
.layer-row:hover { background: #1e1e1e; }
.layer-row input[type=checkbox] { accent-color: #2980d9; width: 14px; height: 14px; cursor: pointer; }
.layer-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.layer-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #bbb; }
.layer-count { color: #555; font-size: 10px; }

#stats-box {
  border-top: 1px solid #2c2c2c; padding: 10px 12px; flex-shrink: 0; font-size: 11px;
}
#stats-box .stat { display: flex; justify-content: space-between; padding: 2px 0; }
#stats-box .stat span:first-child { color: #777; }
#stats-box .stat span:last-child  { color: #ddd; }

#export-btn {
  margin: 8px 12px; padding: 7px; text-align: center; border-radius: 6px;
  background: #1a5a1a; border: 1px solid #2a8a2a; color: #7ed97e;
  cursor: pointer; font-size: 12px; font-weight: 600;
  transition: background .12s;
}
#export-btn:hover { background: #1e6e1e; }

/* ── Canvas ───────────────────────────────────────────────── */
#canvas-wrap { flex: 1; overflow: hidden; position: relative; cursor: crosshair; }
canvas { display: block; }
#hover-info {
  position: absolute; bottom: 10px; left: 10px;
  background: rgba(0,0,0,.75); color: #ccc; font-size: 11px;
  padding: 4px 8px; border-radius: 4px; pointer-events: none;
  display: none;
}
</style>
</head>
<body>

<div id="toolbar">
  <span class="title">Line Connect</span>
  <div class="sep"></div>

  <label class="btn" title="Load a lines_data.json file">
    Load JSON
    <input type="file" accept=".json" id="file-input" style="display:none">
  </label>

  <div class="sep"></div>

  <div class="ctl-group">
    <label>Mode</label>
    <button class="btn active" id="mode-raw"      onclick="setMode('raw')">Raw</button>
    <button class="btn"        id="mode-connected" onclick="setMode('connected')">Connected</button>
    <button class="btn"        id="mode-polygon"   onclick="setMode('polygon')">Polygons</button>
  </div>

  <div class="sep"></div>

  <div class="ctl-group">
    <label>Snap</label>
    <input type="range" id="snap-slider" min="0.1" max="10" step="0.1" value="1"
           oninput="snapValEl.textContent=parseFloat(this.value).toFixed(1)+'pt'; scheduleRebuild()">
    <span class="val" id="snap-val">1.0pt</span>
  </div>

  <div class="ctl-group">
    <label>Min len</label>
    <input type="range" id="minlen-slider" min="0" max="20" step="0.5" value="0.5"
           oninput="minLenValEl.textContent=parseFloat(this.value).toFixed(1)+'pt'; scheduleRebuild()">
    <span class="val" id="minlen-val">0.5pt</span>
  </div>

  <div class="ctl-group">
    <label>Line width</label>
    <input type="range" id="lw-slider" min="0.5" max="6" step="0.5" value="1.5"
           oninput="lwValEl.textContent=parseFloat(this.value).toFixed(1)+'px'; render()">
    <span class="val" id="lw-val">1.5px</span>
  </div>

  <div class="ctl-group">
    <label>Collinear merge</label>
    <input type="checkbox" id="collinear-chk" onchange="scheduleRebuild()" style="accent-color:#2980d9;width:15px;height:15px">
  </div>

  <div class="ctl-group">
    <label>Text</label>
    <input type="checkbox" id="text-chk" checked onchange="render()" style="accent-color:#2980d9;width:15px;height:15px">
  </div>

  <span id="status-right" id="status">No file loaded</span>
</div>

<div id="main">
  <div id="sidebar">
    <h3>Layers</h3>
    <div id="layer-list"></div>

    <div id="stats-box">
      <div class="stat"><span>Raw segs</span><span id="s-raw">—</span></div>
      <div class="stat"><span>After dedup</span><span id="s-dedup">—</span></div>
      <div class="stat"><span>Polylines</span><span id="s-chains">—</span></div>
      <div class="stat"><span>Closed polygons</span><span id="s-poly">—</span></div>
      <div class="stat"><span>Text spans</span><span id="s-text">—</span></div>
    </div>
    <div id="export-btn" onclick="exportGeoJSON()">Export GeoJSON</div>
  </div>

  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="hover-info"></div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────
let data = null;          // raw JSON from file
let activeLayers = {};    // layer -> bool
let layerColors = {};     // layer -> hex
let mode = 'raw';         // raw | connected | polygon
let graph = null;         // processed graph: {deduped, polylines, polygons}
let rebuildTimer = null;

// ── Canvas / pan-zoom ──────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('canvas-wrap');
let panX = 0, panY = 0, scale = 1;
let dragging = false, dragX = 0, dragY = 0;

function resizeCanvas() {
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  render();
}
window.addEventListener('resize', resizeCanvas);

const w2c = (wx, wy) => ({ x: wx*scale + panX, y: wy*scale + panY });
const c2w = (cx, cy) => ({ x: (cx-panX)/scale, y: (cy-panY)/scale });

canvas.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  dragging = true; dragX = e.clientX - panX; dragY = e.clientY - panY;
});
canvas.addEventListener('mousemove', e => {
  if (dragging) { panX = e.clientX - dragX; panY = e.clientY - dragY; render(); }
  const r = canvas.getBoundingClientRect();
  const w = c2w(e.clientX - r.left, e.clientY - r.top);
  document.getElementById('hover-info').style.display = 'block';
  document.getElementById('hover-info').textContent =
    `x: ${w.x.toFixed(1)}  y: ${w.y.toFixed(1)}`;
});
canvas.addEventListener('mouseup',   () => dragging = false);
canvas.addEventListener('mouseleave',() => { dragging = false; document.getElementById('hover-info').style.display='none'; });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  const zoomFactor = e.deltaY < 0 ? 1.15 : 1/1.15;
  panX = mx - (mx - panX)*zoomFactor;
  panY = my - (my - panY)*zoomFactor;
  scale *= zoomFactor;
  render();
}, { passive: false });

// ── File load ─────────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    data = JSON.parse(ev.target.result);
    initLayers();
    fitView();
    render();
    scheduleRebuild();
    document.getElementById('status-right').textContent =
      `${f.name}  (${data.segments.length.toLocaleString()} segs, ${(data.texts||[]).length.toLocaleString()} texts)`;
    document.getElementById('s-text').textContent = (data.texts||[]).length.toLocaleString();
  };
  r.readAsText(f);
  e.target.value = '';
});

// Try auto-loading default
fetch('output/lines_data.json').then(r => r.ok ? r.json() : null).then(d => {
  if (!d) return;
  data = d;
  initLayers();
  fitView();
  render();
  scheduleRebuild();
  document.getElementById('status-right').textContent =
    `lines_data.json  (${data.segments.length.toLocaleString()} segs, ${(data.texts||[]).length.toLocaleString()} texts)`;
  document.getElementById('s-text').textContent = (data.texts||[]).length.toLocaleString();
}).catch(() => {});

// ── Layer init ────────────────────────────────────────────────────
const PALETTE = [
  '#e74c3c','#2ecc71','#3498db','#f39c12','#9b59b6',
  '#1abc9c','#e67e22','#e91e63','#00bcd4','#8bc34a',
  '#ff5722','#673ab7','#009688','#ff9800','#607d8b',
];
function initLayers() {
  layerColors = {};
  activeLayers = {};
  const counts = {};
  for (const s of data.segments) {
    counts[s.layer] = (counts[s.layer]||0) + 1;
    activeLayers[s.layer] = true;
  }
  data.layers.forEach((l, i) => { layerColors[l] = PALETTE[i % PALETTE.length]; });

  const list = document.getElementById('layer-list');
  list.innerHTML = '';
  for (const layer of data.layers) {
    const col = layerColors[layer];
    const row = document.createElement('label');
    row.className = 'layer-row';
    row.innerHTML = `
      <input type="checkbox" checked data-layer="${layer}" onchange="toggleLayer(this)">
      <span class="layer-dot" style="background:${col}"></span>
      <span class="layer-name" title="${layer}">${layer||'(none)'}</span>
      <span class="layer-count">${(counts[layer]||0).toLocaleString()}</span>`;
    list.appendChild(row);
  }
  document.getElementById('s-raw').textContent = data.segments.length.toLocaleString();
}

function toggleLayer(chk) {
  activeLayers[chk.dataset.layer] = chk.checked;
  scheduleRebuild();
}

// ── Fit view ──────────────────────────────────────────────────────
function fitView() {
  if (!data) return;
  const { width: W, height: H } = data.page;
  const cw = canvas.width, ch = canvas.height;
  const margin = 40;
  scale = Math.min((cw - margin*2)/W, (ch - margin*2)/H);
  panX = (cw - W*scale) / 2;
  panY = (ch - H*scale) / 2;
}

// ── Mode buttons ──────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  ['raw','connected','polygon'].forEach(k => {
    document.getElementById('mode-'+k).classList.toggle('active', k===m);
  });
  render();
}

// ── Graph build ───────────────────────────────────────────────────
const snapValEl   = document.getElementById('snap-val');
const minLenValEl = document.getElementById('minlen-val');
const lwValEl     = document.getElementById('lw-val');
const getLW       = () => parseFloat(document.getElementById('lw-slider').value);

function scheduleRebuild() {
  clearTimeout(rebuildTimer);
  rebuildTimer = setTimeout(rebuildGraph, 120);
}

function rebuildGraph() {
  if (!data) return;
  const snapTol = parseFloat(document.getElementById('snap-slider').value);
  const minLen  = parseFloat(document.getElementById('minlen-slider').value);
  const doMerge = document.getElementById('collinear-chk').checked;

  const segs = data.segments.filter(s => activeLayers[s.layer]);

  // ── 1. Snap + deduplicate ──────────────────────────────────────
  const snap = ([x, y]) => [
    Math.round(x/snapTol)*snapTol,
    Math.round(y/snapTol)*snapTol,
  ];
  const nodeKey = ([x, y]) => `${x.toFixed(4)},${y.toFixed(4)}`;

  const seen = new Set();
  const deduped = [];
  for (const seg of segs) {
    const a = snap(seg.a), b = snap(seg.b);
    const len = Math.hypot(b[0]-a[0], b[1]-a[1]);
    if (len < minLen) continue;
    const ka = nodeKey(a), kb = nodeKey(b);
    if (ka === kb) continue;
    const edgeKey = ka < kb ? `${ka}|${kb}` : `${kb}|${ka}`;
    if (seen.has(edgeKey)) continue;
    seen.add(edgeKey);
    deduped.push({ a, b, layer: seg.layer, color: seg.color });
  }

  // ── 2. Optional collinear merge ────────────────────────────────
  let merged = deduped;
  if (doMerge) merged = mergeCollinear(deduped, snapTol);

  // ── 3. Build adjacency graph ───────────────────────────────────
  const adj = new Map(); // nodeKey -> [{segIdx, otherKey, otherPt}]
  for (let i = 0; i < merged.length; i++) {
    const { a, b } = merged[i];
    const ka = nodeKey(a), kb = nodeKey(b);
    if (!adj.has(ka)) adj.set(ka, []);
    if (!adj.has(kb)) adj.set(kb, []);
    adj.get(ka).push({ segIdx: i, otherKey: kb, otherPt: b });
    adj.get(kb).push({ segIdx: i, otherKey: ka, otherPt: a });
  }

  // ── 4. Trace polylines / polygons ─────────────────────────────
  const used = new Set();
  const polylines = [], polygons = [];

  // Start from degree-1 nodes first (open endpoints), then junctions, then cycles
  const allKeys = [...adj.keys()];
  const startOrder = [
    ...allKeys.filter(k => adj.get(k).length === 1),
    ...allKeys.filter(k => adj.get(k).length !== 2),
    ...allKeys.filter(k => adj.get(k).length === 2),
  ];

  for (const startKey of startOrder) {
    const neighbors = adj.get(startKey);
    for (const entry of neighbors) {
      if (used.has(entry.segIdx)) continue;

      const path = [];
      let currKey = startKey;
      let nextEntry = entry;

      // Walk the chain
      while (!used.has(nextEntry.segIdx)) {
        used.add(nextEntry.segIdx);
        if (path.length === 0) path.push(merged[nextEntry.segIdx].a);
        path.push(nextEntry.otherPt);
        currKey = nextEntry.otherKey;

        // Continue only through degree-2 nodes
        const nexts = (adj.get(currKey)||[]).filter(n => !used.has(n.segIdx));
        if (nexts.length !== 1) break;
        nextEntry = nexts[0];
      }

      if (path.length < 2) continue;

      const start = path[0], end = path[path.length-1];
      const isClosed = Math.hypot(end[0]-start[0], end[1]-start[1]) < snapTol*3 && path.length > 3;

      // Tag with most-common layer
      const layerOf = merged[entry.segIdx].layer;
      if (isClosed) polygons.push({ pts: path, layer: layerOf });
      else          polylines.push({ pts: path, layer: layerOf });
    }
  }

  graph = { deduped: merged, polylines, polygons };

  document.getElementById('s-dedup').textContent   = merged.length.toLocaleString();
  document.getElementById('s-chains').textContent  = polylines.length.toLocaleString();
  document.getElementById('s-poly').textContent    = polygons.length.toLocaleString();

  render();
}

// ── Collinear merge ───────────────────────────────────────────────
function mergeCollinear(segs, snapTol) {
  // Group segments by their line direction + offset.
  // Direction: angle quantized to 1°; offset: perpendicular distance from origin.
  const ANG_STEP = Math.PI / 180; // 1°
  function segAngle(a, b) {
    let ang = Math.atan2(b[1]-a[1], b[0]-a[0]);
    if (ang < 0) ang += Math.PI;          // canonical [0, π)
    return Math.round(ang / ANG_STEP);
  }
  function lineOffset(a, b) {
    // Perpendicular distance from origin to the infinite line through a,b
    const dx = b[0]-a[0], dy = b[1]-a[1];
    const len = Math.hypot(dx, dy) || 1;
    const nx = -dy/len, ny = dx/len;
    return Math.round((nx*a[0] + ny*a[1]) / snapTol);
  }

  const groups = new Map();
  for (let i = 0; i < segs.length; i++) {
    const { a, b } = segs[i];
    const angKey = segAngle(a, b);
    const offKey = lineOffset(a, b);
    const key = `${angKey}|${offKey}`;
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(i);
  }

  const used = new Set();
  const result = [];

  for (const [, indices] of groups) {
    if (indices.length === 1) { result.push(segs[indices[0]]); continue; }

    // Project each segment onto the line direction, then merge overlapping intervals
    const { a: a0, b: b0 } = segs[indices[0]];
    const dx = b0[0]-a0[0], dy = b0[1]-a0[1];
    const len = Math.hypot(dx, dy) || 1;
    const ux = dx/len, uy = dy/len;
    const project = pt => pt[0]*ux + pt[1]*uy;
    const ptAt = t => [a0[0] + (t - project(a0))*ux, a0[1] + (t - project(a0))*uy];

    // Collect intervals
    let intervals = indices.map(i => {
      const { a, b } = segs[i];
      const ta = project(a), tb = project(b);
      return ta < tb ? [ta, tb, segs[i].layer, segs[i].color] : [tb, ta, segs[i].layer, segs[i].color];
    });
    intervals.sort((x,y) => x[0]-y[0]);

    // Merge overlapping intervals
    let [start, end, layer, color] = intervals[0];
    for (let k = 1; k < intervals.length; k++) {
      const [s2, e2, l2, c2] = intervals[k];
      if (s2 <= end + snapTol) {
        end = Math.max(end, e2);
      } else {
        const pa = ptAt(start + project(a0)), pb = ptAt(end + project(a0));
        result.push({ a: [pa[0],pa[1]], b: [pb[0],pb[1]], layer, color });
        [start, end, layer, color] = [s2, e2, l2, c2];
      }
    }
    const pa = ptAt(start + project(a0)), pb = ptAt(end + project(a0));
    result.push({ a: [pa[0],pa[1]], b: [pb[0],pb[1]], layer, color });
  }

  return result;
}

// ── Render ────────────────────────────────────────────────────────
function render() {
  const cw = canvas.width, ch = canvas.height;
  ctx.clearRect(0, 0, cw, ch);

  // Background
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, cw, ch);

  if (!data) {
    ctx.fillStyle = '#444'; ctx.font = '18px system-ui'; ctx.textAlign = 'center';
    ctx.fillText('Load a lines_data.json file to begin', cw/2, ch/2);
    return;
  }

  // Page border
  const tl = w2c(0, 0), br = w2c(data.page.width, data.page.height);
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1; ctx.setLineDash([6,4]);
  ctx.strokeRect(tl.x, tl.y, (br.x-tl.x), (br.y-tl.y));
  ctx.setLineDash([]);

  if (mode === 'raw') {
    renderRaw();
  } else if (mode === 'connected') {
    renderConnected();
  } else {
    renderPolygons();
  }

  // Text overlay
  if (document.getElementById('text-chk').checked && data.texts && scale > 0.3) {
    renderText();
  }
}

function renderRaw() {
  if (!data) return;
  // Group by layer for batch drawing
  const byLayer = new Map();
  for (const s of data.segments) {
    if (!activeLayers[s.layer]) continue;
    if (!byLayer.has(s.layer)) byLayer.set(s.layer, []);
    byLayer.get(s.layer).push(s);
  }
  for (const [layer, segs] of byLayer) {
    ctx.strokeStyle = layerColors[layer] || '#888';
    ctx.lineWidth = Math.max(0.5, scale * 0.5);
    ctx.globalAlpha = 0.8;
    ctx.beginPath();
    for (const s of segs) {
      const a = w2c(s.a[0], s.a[1]), b = w2c(s.b[0], s.b[1]);
      ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
    }
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function renderConnected() {
  if (!graph) return;

  // Draw deduped segments lightly
  ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 0.5; ctx.globalAlpha = 1;
  ctx.beginPath();
  for (const s of graph.deduped) {
    const a = w2c(s.a[0], s.a[1]), b = w2c(s.b[0], s.b[1]);
    ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
  }
  ctx.stroke();

  // Draw polylines (colored by layer)
  ctx.lineWidth = Math.max(1, scale * 0.8);
  ctx.globalAlpha = 0.9;
  for (const pl of graph.polylines) {
    ctx.strokeStyle = layerColors[pl.layer] || '#888';
    ctx.beginPath();
    const p0 = w2c(pl.pts[0][0], pl.pts[0][1]);
    ctx.moveTo(p0.x, p0.y);
    for (let i = 1; i < pl.pts.length; i++) {
      const p = w2c(pl.pts[i][0], pl.pts[i][1]);
      ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
  }

  // Draw polygons with fill
  ctx.globalAlpha = 0.15;
  for (const pg of graph.polygons) {
    ctx.fillStyle = layerColors[pg.layer] || '#888';
    ctx.beginPath();
    const p0 = w2c(pg.pts[0][0], pg.pts[0][1]);
    ctx.moveTo(p0.x, p0.y);
    for (let i = 1; i < pg.pts.length; i++) {
      const p = w2c(pg.pts[i][0], pg.pts[i][1]);
      ctx.lineTo(p.x, p.y);
    }
    ctx.closePath();
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.lineWidth = Math.max(1.5, scale);
  for (const pg of graph.polygons) {
    ctx.strokeStyle = layerColors[pg.layer] || '#888';
    ctx.beginPath();
    const p0 = w2c(pg.pts[0][0], pg.pts[0][1]);
    ctx.moveTo(p0.x, p0.y);
    for (let i = 1; i < pg.pts.length; i++) {
      const p = w2c(pg.pts[i][0], pg.pts[i][1]);
      ctx.lineTo(p.x, p.y);
    }
    ctx.closePath();
    ctx.stroke();
  }
}

function renderPolygons() {
  if (!graph) return;
  for (const pg of graph.polygons) {
    const col = layerColors[pg.layer] || '#888';
    ctx.fillStyle = col; ctx.globalAlpha = 0.25;
    ctx.beginPath();
    const p0 = w2c(pg.pts[0][0], pg.pts[0][1]);
    ctx.moveTo(p0.x, p0.y);
    for (let i = 1; i < pg.pts.length; i++) {
      const p = w2c(pg.pts[i][0], pg.pts[i][1]);
      ctx.lineTo(p.x, p.y);
    }
    ctx.closePath(); ctx.fill();
    ctx.globalAlpha = 1; ctx.strokeStyle = col;
    ctx.lineWidth = Math.max(1.5, scale);
    ctx.stroke();
  }
}

function renderText() {
  const minSize = 6;
  ctx.globalAlpha = 0.85;
  for (const t of data.texts) {
    const screenSize = t.size * scale;
    if (screenSize < minSize) continue;
    const p = w2c(t.x, t.y);
    ctx.font = `${Math.min(screenSize, 18)}px system-ui`;
    ctx.fillStyle = t.color === '#000000' ? '#eee' : t.color;
    ctx.textAlign = 'center';
    ctx.fillText(t.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

// ── Export GeoJSON ─────────────────────────────────────────────────
function exportGeoJSON() {
  if (!graph) { alert('Run graph tracing first (switch to Connected or Polygon mode)'); return; }
  const { width: W, height: H } = data.page;

  const features = [];
  graph.polygons.forEach((pg, i) => {
    // Flip Y (PDF coords: y grows down; GeoJSON convention: y grows up)
    const coords = pg.pts.map(([x,y]) => [x, H-y]);
    if (coords[0][0] !== coords[coords.length-1][0] ||
        coords[0][1] !== coords[coords.length-1][1]) {
      coords.push(coords[0].slice()); // close ring
    }
    features.push({
      type: 'Feature',
      properties: { id: i+1, layer: pg.layer },
      geometry: { type: 'Polygon', coordinates: [coords] }
    });
  });
  graph.polylines.forEach((pl, i) => {
    const coords = pl.pts.map(([x,y]) => [x, H-y]);
    features.push({
      type: 'Feature',
      properties: { id: i+1, layer: pl.layer, type: 'polyline' },
      geometry: { type: 'LineString', coordinates: coords }
    });
  });

  const geojson = { type: 'FeatureCollection', features };
  const blob = new Blob([JSON.stringify(geojson, null, 2)], { type: 'application/json' });
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob), download: 'lines_export.geojson'
  });
  a.click();
}

// ── Init ───────────────────────────────────────────────────────────
resizeCanvas();
</script>
