<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Block Map Editor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a2e; color: #eee; font-family: sans-serif;
       display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

#toolbar {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  padding: 7px 12px; background: #16213e; border-bottom: 2px solid #0f3460;
  flex-shrink: 0; min-height: 46px;
}
.tool-btn {
  padding: 5px 13px; border: 1px solid #2a5080; background: #1e3a5f;
  color: #cde; border-radius: 4px; cursor: pointer; font-size: 13px;
  transition: background .15s;
}
.tool-btn:hover { background: #2a5a8a; }
.tool-btn.active { background: #c0392b; border-color: #e74c3c; color: #fff; }
.tool-btn:disabled { opacity: .4; cursor: default; }

/* Segmented level-selector group */
.lvl-group { display: flex; }
.lvl-btn { border-radius: 0; border-right-width: 0; padding: 5px 10px; }
.lvl-btn:first-child { border-radius: 4px 0 0 4px; }
.lvl-btn:last-child  { border-radius: 0 4px 4px 0; border-right-width: 1px; }
.lvl-btn.active { background: #1a7a4a; border-color: #27ae60; color: #fff; }
.lvl-btn.active:hover { background: #27ae60; }
.lvl-label { font-size: 11px; color: #7a9abb; align-self: center; }

.sep { width: 1px; height: 26px; background: #2a4060; margin: 0 2px; }
.label-input { display: none; }
#zoomInfo { font-size: 12px; color: #7a9abb; margin-left: 4px; }

#canvas-wrap { flex: 1; position: relative; overflow: hidden; }
#canvas { display: block; }
#status {
  position: absolute; bottom: 8px; left: 8px; right: 8px;
  background: rgba(0,0,0,.72); padding: 5px 12px; border-radius: 5px;
  font-size: 12px; pointer-events: none; color: #acd;
}

/* Modal */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.65); z-index: 200;
  align-items: center; justify-content: center;
}
.overlay.show { display: flex; }
.modal {
  background: #16213e; border: 1px solid #2a5080; border-radius: 8px;
  padding: 28px 32px; min-width: 300px; box-shadow: 0 8px 32px rgba(0,0,0,.6);
}
.modal h3 { margin-bottom: 18px; color: #e74c3c; font-size: 16px; }
.modal label { display: block; margin-bottom: 14px; font-size: 13px; color: #acd; }
.modal input[type=number] {
  display: block; width: 100%; padding: 7px 10px; margin-top: 5px;
  background: #0d1e35; border: 1px solid #2a5080; color: #eee;
  border-radius: 4px; font-size: 14px;
}
.modal-btns { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
.btn-ok  { padding: 8px 22px; background: #c0392b; border: none; color: #fff; border-radius: 4px; cursor: pointer; font-size: 13px; }
.btn-ok:hover { background: #e74c3c; }
.btn-cancel { padding: 8px 22px; background: #1e3a5f; border: 1px solid #2a5080; color: #cde; border-radius: 4px; cursor: pointer; font-size: 13px; }
.btn-cancel:hover { background: #2a5a8a; }
</style>
</head>
<body>

<div id="toolbar">
  <label class="tool-btn" style="cursor:pointer" title="Load a background image">
    Load Image
    <input class="label-input" type="file" id="imgInput" accept="image/*">
  </label>
  <div class="sep"></div>
  <span class="lvl-label">Select:</span>
  <div class="lvl-group">
    <button class="tool-btn lvl-btn active" id="btnLvlBlock"  title="Select whole block (1)">Block</button>
    <button class="tool-btn lvl-btn"        id="btnLvlCol"    title="Select column (2)">Column</button>
    <button class="tool-btn lvl-btn"        id="btnLvlRow"    title="Select row (3)">Row</button>
    <button class="tool-btn lvl-btn"        id="btnLvlUnit"   title="Select unit (4)">Unit</button>
  </div>
  <div class="sep"></div>
  <button class="tool-btn" id="btnDraw"   title="Draw a new block (D)">Draw Block</button>
  <div class="sep"></div>
  <button class="tool-btn" id="btnDelete"  title="Delete selected (Del)">Delete</button>
  <button class="tool-btn" id="btnExport"  title="Export GeoJSON">Export GeoJSON</button>
  <div class="sep"></div>
  <span id="zoomInfo">100 %</span>
</div>

<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
  <div id="status">Load an image or start drawing blocks</div>
</div>

<!-- Grid setup modal -->
<div class="overlay" id="gridModal">
  <div class="modal">
    <h3>Set Grid Divisions</h3>
    <label>Columns
      <input type="number" id="inputCols" value="2" min="1" max="30">
    </label>
    <label>Default Rows per Column
      <input type="number" id="inputRows" value="8" min="1" max="60">
    </label>
    <div class="modal-btns">
      <button class="btn-cancel" id="btnModalCancel">Cancel</button>
      <button class="btn-ok"     id="btnModalOk">OK</button>
    </div>
  </div>
</div>

<script>
// ─── Canvas & DOM refs ────────────────────────────────────────────────────────
const canvas   = document.getElementById('canvas');
const ctx      = canvas.getContext('2d');
const wrap     = document.getElementById('canvas-wrap');
const statusEl = document.getElementById('status');
const zoomEl   = document.getElementById('zoomInfo');

// ─── App state ────────────────────────────────────────────────────────────────
let bgImage = null;
let blocks  = [];
let nextId  = 1;

// Selection
// selMode: what level is being selected
let selMode    = 'block';   // 'block' | 'column' | 'row' | 'unit'
let selectedId = null;      // selected block id
let selColIdx  = null;      // selected column index (column/row/unit modes)
let selRowIdx  = null;      // selected row index within that column (row/unit mode)

// Lock icon hit areas rebuilt every render
let lockHitAreas = [];      // [{blockId, axis, colIdx, idx, cx, cy}]

// Draw / baseline mode
let mode        = 'select'; // 'select' | 'draw' | 'baseline'
let drawVerts   = [];
let pendingBlock = null;
let hoveredEdge  = -1;

// Drag state
let drag = null;  // {blockId, axis:'col'|'row', colIdx(row only), idx}

// Pan/zoom
let panning  = false;
let panStart = null;
let panX = 0, panY = 0, scale = 1;
let mouseCanvas = null;

// ─── Block data helpers ───────────────────────────────────────────────────────
// Each block stores per-column row data:
//   colTDivs[ci]  — t-values of row dividers in column ci
//   colTLocks[ci] — lock flags for those dividers
function colTD(b, ci)  { return (b.colTDivs  ||[])[ci] || []; }
function colTL(b, ci)  { return (b.colTLocks ||[])[ci] || []; }
function colRows(b, ci){ return colTD(b,ci).length + 1; }
function totalRows(b)  { return Math.max(...Array.from({length:b.cols},(_,i)=>colRows(b,i))); }

// ─── Coordinate helpers ───────────────────────────────────────────────────────
const w2c = (wx, wy) => ({ x: wx*scale + panX, y: wy*scale + panY });
const c2w = (cx, cy) => ({ x: (cx-panX)/scale,  y: (cy-panY)/scale  });
const wpt = p => w2c(p.x, p.y);

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  lockHitAreas = [];
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W, H);

  if (bgImage)
    ctx.drawImage(bgImage, panX, panY, bgImage.width*scale, bgImage.height*scale);

  for (const b of blocks) drawBlock(b);

  // In-progress polygon
  if (mode === 'draw' && drawVerts.length > 0) {
    ctx.save();
    ctx.strokeStyle = '#e74c3c'; ctx.lineWidth = 2;
    ctx.setLineDash([5,4]);
    ctx.beginPath();
    const p0 = wpt(drawVerts[0]); ctx.moveTo(p0.x, p0.y);
    for (let i = 1; i < drawVerts.length; i++) { const p = wpt(drawVerts[i]); ctx.lineTo(p.x, p.y); }
    if (mouseCanvas) ctx.lineTo(mouseCanvas.x, mouseCanvas.y);
    ctx.stroke(); ctx.setLineDash([]);
    for (const v of drawVerts) {
      const p = wpt(v);
      ctx.fillStyle = '#e74c3c';
      ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill();
    }
    if (drawVerts.length >= 3) {
      const fp = wpt(drawVerts[0]);
      ctx.strokeStyle = 'rgba(255,255,255,.8)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(fp.x, fp.y, 10, 0, Math.PI*2); ctx.stroke();
    }
    ctx.restore();
  }

  if (mode === 'baseline' && pendingBlock) drawEdgeHighlights(pendingBlock);
}

// ─── Draw a single block ──────────────────────────────────────────────────────
function drawBlock(b) {
  if (!b.verts || b.verts.length < 3) return;
  const isBlockSel = (b.id === selectedId);
  const pts = b.verts.map(wpt);

  ctx.save();

  // Polygon fill + outline
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.closePath();
  ctx.fillStyle   = isBlockSel ? 'rgba(231,76,60,.12)' : 'rgba(255,215,80,.15)';
  ctx.strokeStyle = isBlockSel ? '#e74c3c' : '#c8960a';
  ctx.lineWidth   = isBlockSel ? 2.5 : 1.8;
  ctx.fill(); ctx.stroke();

  if (b.cols && b.baseline != null && b.colTDivs) drawGrid(b);

  // Vertex handles (block mode, selected)
  if (isBlockSel && selMode === 'block') {
    for (const p of pts) {
      ctx.fillStyle = '#e74c3c';
      ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI*2); ctx.fill();
    }
  }
  ctx.restore();
}

// ─── Draw grid (per-column row dividers) ─────────────────────────────────────
function drawGrid(b) {
  const sPos   = [0, ...b.sDivs, 1];
  const sLocks = b.sLocks || [];
  const isSel  = b.id === selectedId;
  const gridCol = isSel ? 'rgba(231,76,60,.7)' : 'rgba(160,110,0,.8)';

  ctx.save();

  // ── Column selection highlight ───────────────────────────────────────────
  if (isSel && selMode === 'column' && selColIdx != null) {
    const ci = selColIdx;
    const s0 = sPos[ci], s1 = sPos[ci+1];
    const BL = wpt(gp(b,s0,0)), BR = wpt(gp(b,s1,0));
    const TL = wpt(colTop(b,s0)), TR = wpt(colTop(b,s1));
    ctx.fillStyle = 'rgba(39,174,96,.22)';
    ctx.beginPath(); ctx.moveTo(BL.x,BL.y); ctx.lineTo(BR.x,BR.y);
    ctx.lineTo(TR.x,TR.y); ctx.lineTo(TL.x,TL.y); ctx.closePath(); ctx.fill();
  }

  // ── Row selection highlight — full band across ALL columns ──────────────
  if (isSel && selMode === 'row' && selColIdx != null && selRowIdx != null) {
    const anchorTP = [0, ...colTD(b, selColIdx), 1];
    const t0 = anchorTP[selRowIdx], t1 = anchorTP[selRowIdx+1];
    ctx.fillStyle = 'rgba(155,89,182,.22)';
    for (let ci = 0; ci < b.cols; ci++) {
      const s0=sPos[ci], s1=sPos[ci+1];
      const tPos=[0,...colTD(b,ci),1];
      for (let ri=0; ri<tPos.length-1; ri++) {
        if (tPos[ri+1]<=t0+0.005 || tPos[ri]>=t1-0.005) continue;
        const ct0=Math.max(tPos[ri],t0), ct1=Math.min(tPos[ri+1],t1);
        const BL=wpt(gp(b,s0,ct0)), BR=wpt(gp(b,s1,ct0));
        const TR=wpt(gp(b,s1,ct1)), TL=wpt(gp(b,s0,ct1));
        ctx.beginPath(); ctx.moveTo(BL.x,BL.y); ctx.lineTo(BR.x,BR.y);
        ctx.lineTo(TR.x,TR.y); ctx.lineTo(TL.x,TL.y); ctx.closePath(); ctx.fill();
      }
    }
  }

  // ── Unit selection highlight — single cell ────────────────────────────
  if (isSel && selMode === 'unit' && selColIdx != null && selRowIdx != null) {
    const ci=selColIdx, ri=selRowIdx;
    const s0=sPos[ci], s1=sPos[ci+1];
    const tPos=[0,...colTD(b,ci),1];
    const t0=tPos[ri], t1=tPos[ri+1];
    const BL=wpt(gp(b,s0,t0)), BR=wpt(gp(b,s1,t0));
    const TR=wpt(gp(b,s1,t1)), TL=wpt(gp(b,s0,t1));
    ctx.fillStyle='rgba(52,152,219,.35)';
    ctx.beginPath(); ctx.moveTo(BL.x,BL.y); ctx.lineTo(BR.x,BR.y);
    ctx.lineTo(TR.x,TR.y); ctx.lineTo(TL.x,TL.y); ctx.closePath(); ctx.fill();
  }

  // ── Column dividers ──────────────────────────────────────────────────────
  for (let i = 1; i < sPos.length-1; i++) {
    const locked = !!sLocks[i-1];
    ctx.strokeStyle = locked ? 'rgba(243,156,18,.95)' : gridCol;
    ctx.lineWidth   = locked ? 1.8 : 1;
    ctx.setLineDash(locked ? [4,3] : []);
    const p0 = wpt(gp(b, sPos[i], 0)), p1 = wpt(colTop(b, sPos[i]));
    ctx.beginPath(); ctx.moveTo(p0.x,p0.y); ctx.lineTo(p1.x,p1.y); ctx.stroke();
  }
  ctx.setLineDash([]);

  // ── Row dividers per column ──────────────────────────────────────────────
  for (let ci = 0; ci < b.cols; ci++) {
    const s0 = sPos[ci], s1 = sPos[ci+1];
    const tDivs  = colTD(b, ci);
    const tLocks = colTL(b, ci);
    for (let ti = 0; ti < tDivs.length; ti++) {
      const t      = tDivs[ti];
      const locked = !!tLocks[ti];
      ctx.strokeStyle = locked ? 'rgba(243,156,18,.95)' : gridCol;
      ctx.lineWidth   = locked ? 1.8 : 1;
      ctx.setLineDash(locked ? [4,3] : []);
      const p0 = wpt(gp(b, s0, t)), p1 = wpt(gp(b, s1, t));
      ctx.beginPath(); ctx.moveTo(p0.x,p0.y); ctx.lineTo(p1.x,p1.y); ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  // ── Row-band vertical sub-dividers ──────────────────────────────────────
  for (const rb of (b.rowBandSDivs||[])) {
    for (let si=0; si<rb.sDivs.length; si++) {
      const sv=rb.sDivs[si], locked=!!rb.sLocks[si];
      ctx.strokeStyle = locked ? 'rgba(243,156,18,.95)' : gridCol;
      ctx.lineWidth   = locked ? 1.8 : 1;
      ctx.setLineDash(locked ? [4,3] : []);
      const p0=wpt(gp(b,sv,rb.t0)), p1=wpt(gp(b,sv,rb.t1));
      ctx.beginPath(); ctx.moveTo(p0.x,p0.y); ctx.lineTo(p1.x,p1.y); ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  // ── Handles + lock icons (only when selected) ────────────────────────────
  if (isSel) {
    // Column handles — shown in block mode
    if (selMode === 'block') {
      for (let i = 1; i < sPos.length-1; i++) {
        const locked = !!sLocks[i-1];
        const p = wpt(gp(b, sPos[i], 0.5));
        if (!locked) { ctx.fillStyle='#e74c3c'; ctx.fillRect(p.x-4,p.y-4,8,8); }
        const lx = p.x+14, ly = p.y;
        drawLockIcon(lx, ly, locked);
        lockHitAreas.push({blockId:b.id, axis:'col', colIdx:null, idx:i-1, cx:lx, cy:ly});
      }
    }

    // Row handles — shown in column mode for the selected column
    if (selMode === 'column' && selColIdx != null) {
      const ci    = selColIdx;
      const s0    = sPos[ci], s1 = sPos[ci+1];
      const sc    = (s0+s1)/2;
      const tDivs = colTD(b, ci);
      const tLocks= colTL(b, ci);
      for (let ti = 0; ti < tDivs.length; ti++) {
        const t      = tDivs[ti];
        const locked = !!tLocks[ti];
        const p      = wpt(gp(b, sc, t));
        if (!locked) { ctx.fillStyle='#27ae60'; ctx.fillRect(p.x-4,p.y-4,8,8); }
        const lx = p.x+14, ly = p.y;
        drawLockIcon(lx, ly, locked);
        lockHitAreas.push({blockId:b.id, axis:'row', colIdx:ci, idx:ti, cx:lx, cy:ly});
      }
      ctx.fillStyle='rgba(39,174,96,.6)';
      ctx.font='11px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText('dbl-click to add/remove row', wpt(gp(b,sc,0.02)).x, wpt(gp(b,sc,0.02)).y+2);
    }

    // Row mode — shared row boundary drag handles + vertical sub-divider handles
    if (selMode === 'row') {
      // 1. Full-width handles on horizontal row dividers (drag up/down)
      const seenT = new Set();
      for (let ci=0; ci<b.cols; ci++)
        colTD(b,ci).forEach(t => seenT.add(Math.round(t*2000)/2000));
      for (const t of [...seenT].sort((a,c)=>a-c)) {
        const p = wpt(gp(b, 0.5, t));
        ctx.fillStyle = '#9b59b6';
        ctx.fillRect(p.x-4, p.y-4, 8, 8);
        lockHitAreas.push({blockId:b.id, axis:'row', colIdx:null, tBase:t, cx:p.x+14, cy:p.y});
      }

      // 2. Vertical sub-divider handles for the selected row band (drag left/right)
      if (selColIdx!=null && selRowIdx!=null) {
        const anchorTP = [0,...colTD(b,selColIdx),1];
        const t0=anchorTP[selRowIdx], t1=anchorTP[selRowIdx+1];
        const rb = (b.rowBandSDivs||[]).find(r=>Math.abs(r.t0-t0)<0.005&&Math.abs(r.t1-t1)<0.005);
        if (rb) {
          const tc=(t0+t1)/2;
          for (let si=0; si<rb.sDivs.length; si++) {
            const locked=!!rb.sLocks[si];
            const sv=rb.sDivs[si];
            const p=wpt(gp(b, sv, tc));
            if (!locked){ctx.fillStyle='#8e44ad'; ctx.fillRect(p.x-4,p.y-4,8,8);}
            const lx=p.x, ly=p.y+14;
            drawLockIcon(lx, ly, locked);
            lockHitAreas.push({blockId:b.id, axis:'rowBandS', t0, t1, idx:si, cx:lx, cy:ly});
          }
        }
        ctx.fillStyle='rgba(155,89,182,.6)';
        ctx.font='11px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='top';
        const t0p=wpt(gp(b,0.5,t0));
        ctx.fillText('dbl-click inside row to split vertically', t0p.x, t0p.y+2);
      }
    }
  }

  // ── Unit numbers ─────────────────────────────────────────────────────────
  const fontSize = Math.max(9, Math.min(16, 13*scale));
  ctx.fillStyle = '#c0392b';
  ctx.font = `bold ${fontSize}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  let num = 1;
  for (let ci = 0; ci < b.cols; ci++) {
    const s0 = sPos[ci], s1 = sPos[ci+1];
    const tPos = [0, ...colTD(b, ci), 1];
    for (let ri = 0; ri < tPos.length-1; ri++) {
      const t0=tPos[ri], t1=tPos[ri+1];
      const rb=(b.rowBandSDivs||[]).find(r=>Math.abs(r.t0-t0)<0.005&&Math.abs(r.t1-t1)<0.005);
      const subS = rb ? [s0,...rb.sDivs.filter(sv=>sv>s0&&sv<s1),s1] : [s0,s1];
      const tc=(t0+t1)/2;
      for (let ssi=0;ssi<subS.length-1;ssi++) {
        const sc=(subS[ssi]+subS[ssi+1])/2;
        const cp=wpt(gp(b,sc,tc));
        ctx.fillText(String(num++), cp.x, cp.y);
      }
    }
  }

  ctx.restore();
}

// ─── Padlock icon ─────────────────────────────────────────────────────────────
function drawLockIcon(cx, cy, locked) {
  ctx.save();
  const bw=9, bh=7, r=3.5;
  ctx.fillStyle   = locked ? '#f39c12' : 'rgba(140,140,140,0.45)';
  ctx.strokeStyle = locked ? '#d68910' : 'rgba(100,100,100,0.5)';
  ctx.lineWidth   = 1;
  ctx.beginPath(); ctx.rect(cx-bw/2, cy+1, bw, bh); ctx.fill(); ctx.stroke();
  ctx.strokeStyle = locked ? '#d68910' : 'rgba(100,100,100,0.5)';
  ctx.lineWidth   = 2;
  ctx.beginPath();
  if (locked) ctx.arc(cx, cy+1, r, Math.PI, 0);
  else        ctx.arc(cx, cy,   r, Math.PI, -Math.PI/6);
  ctx.stroke();
  ctx.restore();
}

// ─── Edge highlights (baseline selection) ────────────────────────────────────
function drawEdgeHighlights(b) {
  const n = b.verts.length;
  ctx.save();
  for (let i = 0; i < n; i++) {
    const A = wpt(b.verts[i]), B = wpt(b.verts[(i+1)%n]);
    const hov = i===hoveredEdge;
    ctx.strokeStyle = hov ? '#00e676' : 'rgba(0,230,118,.45)';
    ctx.lineWidth   = hov ? 5 : 2.5;
    ctx.setLineDash(hov ? [] : [6,4]);
    ctx.beginPath(); ctx.moveTo(A.x,A.y); ctx.lineTo(B.x,B.y); ctx.stroke();
    ctx.setLineDash([]);
    if (hov) {
      ctx.fillStyle='#00e676'; ctx.font='12px sans-serif'; ctx.textAlign='center';
      ctx.fillText('Click → baseline', (A.x+B.x)/2, (A.y+B.y)/2-12);
    }
  }
  ctx.restore();
}

// ─── Grid math ────────────────────────────────────────────────────────────────
function gp(b, s, t) {
  const { A, B, vx, vy, maxV } = blInfo(b);
  return { x: A.x+s*(B.x-A.x)+t*maxV*vx, y: A.y+s*(B.y-A.y)+t*maxV*vy };
}

function colTop(b, s) {
  const { A, B, vx, vy } = blInfo(b);
  const px = A.x+s*(B.x-A.x), py = A.y+s*(B.y-A.y);
  const n=b.verts.length, ei=b.baseline;
  let best=Infinity;
  for (let i=0;i<n;i++) {
    if (i===ei) continue;
    const P=b.verts[i], Q=b.verts[(i+1)%n];
    const t=raySegIntersect(px,py,vx,vy,P.x,P.y,Q.x-P.x,Q.y-P.y);
    if (t!==null && t>1e-6 && t<best) best=t;
  }
  if (!isFinite(best)) best=blInfo(b).maxV;
  return { x:px+best*vx, y:py+best*vy };
}

function raySegIntersect(px,py,dx,dy,ax,ay,bx,by) {
  const denom=dx*by-dy*bx;
  if (Math.abs(denom)<1e-10) return null;
  const t=((ax-px)*by-(ay-py)*bx)/denom;
  const s=((ax-px)*dy-(ay-py)*dx)/denom;
  if (s<-1e-4||s>1+1e-4) return null;
  return t>=0?t:null;
}

function blInfo(b) {
  const ei=b.baseline, n=b.verts.length;
  const A=b.verts[ei], B=b.verts[(ei+1)%n];
  const dx=B.x-A.x, dy=B.y-A.y;
  const len=Math.hypot(dx,dy);
  const ux=dx/len, uy=dy/len;
  let vx=-uy, vy=ux;
  const other=b.verts[(ei+2)%n];
  if ((other.x-A.x)*vx+(other.y-A.y)*vy<0){vx=-vx;vy=-vy;}
  const maxV=Math.max(...b.verts.map(v=>(v.x-A.x)*vx+(v.y-A.y)*vy));
  return {A,B,ux,uy,vx,vy,len,maxV};
}

// Returns the row-band sub-divider record for t-range [t0,t1], creating it if absent.
function getOrCreateRowBand(b, t0, t1) {
  if (!b.rowBandSDivs) b.rowBandSDivs = [];
  let rb = b.rowBandSDivs.find(r => Math.abs(r.t0-t0)<0.005 && Math.abs(r.t1-t1)<0.005);
  if (!rb) { rb = {t0, t1, sDivs:[], sLocks:[]}; b.rowBandSDivs.push(rb); }
  return rb;
}

// ─── Hit testing ──────────────────────────────────────────────────────────────
function ptInPoly(px,py,verts) {
  let inside=false;
  const n=verts.length;
  for (let i=0,j=n-1;i<n;j=i++) {
    const xi=verts[i].x,yi=verts[i].y,xj=verts[j].x,yj=verts[j].y;
    if (((yi>py)!==(yj>py))&&px<(xj-xi)*(py-yi)/(yj-yi)+xi) inside=!inside;
  }
  return inside;
}

function hitBlock(wx,wy) {
  for (let i=blocks.length-1;i>=0;i--)
    if (blocks[i].verts && ptInPoly(wx,wy,blocks[i].verts)) return blocks[i].id;
  return null;
}

// Returns column index ci if (wx,wy) is inside that column's strip, else null
function hitColumn(b, wx, wy) {
  if (!ptInPoly(wx,wy,b.verts)) return null;
  const info = blInfo(b);
  const s = ((wx-info.A.x)*info.ux+(wy-info.A.y)*info.uy)/info.len;
  const sPos = [0,...b.sDivs,1];
  for (let ci=0;ci<b.cols;ci++)
    if (s>=sPos[ci]-0.005 && s<=sPos[ci+1]+0.005) return ci;
  return null;
}

// Returns row index ri within column ci if (wx,wy) is inside that row strip, else null
function hitRowInCol(b, ci, wx, wy) {
  if (!ptInPoly(wx,wy,b.verts)) return null;
  const info = blInfo(b);
  const t = ((wx-info.A.x)*info.vx+(wy-info.A.y)*info.vy)/info.maxV;
  const tPos = [0,...colTD(b,ci),1];
  for (let ri=0;ri<tPos.length-1;ri++)
    if (t>=tPos[ri]-0.005 && t<=tPos[ri+1]+0.005) return ri;
  return null;
}

// Hit column divider (block mode drag target) — returns {axis:'col', idx} or null
function hitColDivider(b, wx, wy) {
  if (b.baseline==null) return null;
  const thresh = 7/scale;
  const sPos   = [0,...b.sDivs,1];
  const sLocks = b.sLocks||[];
  for (let i=1;i<sPos.length-1;i++) {
    if (sLocks[i-1]) continue;
    const base=gp(b,sPos[i],0), top=colTop(b,sPos[i]);
    for (let k=0;k<=8;k++) {
      const f=k/8;
      const p={x:base.x+f*(top.x-base.x), y:base.y+f*(top.y-base.y)};
      if (Math.hypot(p.x-wx,p.y-wy)<thresh) return {axis:'col',idx:i-1};
    }
  }
  return null;
}

// Hit row divider within a specific column — returns {axis:'row', colIdx, idx} or null
function hitRowDivider(b, ci, wx, wy) {
  const thresh  = 7/scale;
  const sPos    = [0,...b.sDivs,1];
  const s0=sPos[ci], s1=sPos[ci+1];
  const tDivs   = colTD(b,ci);
  const tLocks  = colTL(b,ci);
  for (let ti=0;ti<tDivs.length;ti++) {
    if (tLocks[ti]) continue;
    const p0=gp(b,s0,tDivs[ti]), p1=gp(b,s1,tDivs[ti]);
    for (let k=0;k<=8;k++) {
      const f=k/8;
      const p={x:p0.x+f*(p1.x-p0.x), y:p0.y+f*(p1.y-p0.y)};
      if (Math.hypot(p.x-wx,p.y-wy)<thresh) return {axis:'row',colIdx:ci,idx:ti};
    }
  }
  return null;
}

// Hit test for a row-band vertical sub-divider (within the selected row band).
// Returns { axis:'rowBandS', t0, t1, idx } or null.
function hitRowBandSDivider(b, wx, wy) {
  if (b.baseline==null || selColIdx==null || selRowIdx==null) return null;
  const anchorTP = [0,...colTD(b,selColIdx),1];
  const t0=anchorTP[selRowIdx], t1=anchorTP[selRowIdx+1];
  const rb = (b.rowBandSDivs||[]).find(r=>Math.abs(r.t0-t0)<0.005&&Math.abs(r.t1-t1)<0.005);
  if (!rb) return null;
  const thresh = 7/scale;
  for (let si=0; si<rb.sDivs.length; si++) {
    if (rb.sLocks[si]) continue;
    const sv = rb.sDivs[si];
    for (let k=0; k<=8; k++) {
      const t = t0 + (k/8)*(t1-t0);
      const p = gp(b, sv, t);
      if (Math.hypot(p.x-wx,p.y-wy)<thresh) return {axis:'rowBandS',t0,t1,idx:si};
    }
  }
  return null;
}

// Hit test for a shared row divider line (full width) across all columns.
// Returns { axis:'row', colIdx:null, tBase:t } or null.
function hitSharedRowDivider(b, wx, wy) {
  if (b.baseline == null) return null;
  const thresh = 7/scale;
  const sPos = [0,...b.sDivs,1];
  // Collect all unique t-values
  const seenT = new Set();
  for (let ci=0; ci<b.cols; ci++) colTD(b,ci).forEach(t=>seenT.add(Math.round(t*2000)/2000));
  for (const t of seenT) {
    // Sample along the full-width row line at this t-value
    for (let k=0; k<=12; k++) {
      const s = k/12;
      const p = gp(b, s, t);
      if (Math.hypot(p.x-wx, p.y-wy) < thresh) return {axis:'row', colIdx:null, tBase:t};
    }
  }
  return null;
}

function hitEdge(b,wx,wy) {
  const thresh=9/scale, n=b.verts.length;
  for (let i=0;i<n;i++) {
    const A=b.verts[i], B=b.verts[(i+1)%n];
    const dx=B.x-A.x, dy=B.y-A.y, lsq=dx*dx+dy*dy;
    if (!lsq) continue;
    const t=Math.max(0,Math.min(1,((wx-A.x)*dx+(wy-A.y)*dy)/lsq));
    if (Math.hypot(wx-(A.x+t*dx),wy-(A.y+t*dy))<thresh) return i;
  }
  return -1;
}

// ─── Mouse events ─────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('mouseup',   onUp);
canvas.addEventListener('dblclick',  onDbl);
canvas.addEventListener('wheel',     onWheel, {passive:false});
canvas.addEventListener('contextmenu', e=>e.preventDefault());

function onMove(e) {
  const {cx,cy,w} = evCoords(e);
  mouseCanvas = {x:cx,y:cy};

  if (panning) {
    panX+=cx-panStart.x; panY+=cy-panStart.y; panStart={x:cx,y:cy};
    render(); return;
  }
  if (drag) { applyDrag(w.x,w.y); render(); return; }
  if (mode==='baseline' && pendingBlock) {
    const he=hitEdge(pendingBlock,w.x,w.y);
    if (he!==hoveredEdge){hoveredEdge=he;render();} return;
  }
  if (mode==='select' && selectedId) {
    const overLock=lockHitAreas.some(la=>Math.hypot(cx-la.cx,cy-la.cy)<10);
    if (overLock){canvas.style.cursor='pointer';return;}
    const b=blocks.find(b=>b.id===selectedId);
    if (b) {
      let h=null;
      if (selMode==='block')  h=hitColDivider(b,w.x,w.y);
      if (selMode==='column' && selColIdx!=null) h=hitRowDivider(b,selColIdx,w.x,w.y);
      if (selMode==='row') {
        h = hitRowBandSDivider(b,w.x,w.y) || hitSharedRowDivider(b,w.x,w.y);
      }
      canvas.style.cursor = h
        ? (h.axis==='col'||h.axis==='rowBandS' ? 'ew-resize' : 'ns-resize')
        : 'default';
    }
  }
  if (mode==='draw') render();
}

function onDown(e) {
  const {cx,cy,w} = evCoords(e);
  if (e.button===1||e.button===2){panning=true;panStart={x:cx,y:cy};return;}
  if (e.button!==0) return;

  if (mode==='select') {
    // 1. Lock icon toggle
    for (const la of lockHitAreas) {
      if (Math.hypot(cx-la.cx,cy-la.cy)<10) {
        const b=blocks.find(b=>b.id===la.blockId);
        if (!b) return;
        if (la.axis==='col') {
          b.sLocks=b.sLocks||Array(b.sDivs.length).fill(false);
          b.sLocks[la.idx]=!b.sLocks[la.idx];
        } else if (la.axis==='rowBandS') {
          const rb=getOrCreateRowBand(b,la.t0,la.t1);
          rb.sLocks[la.idx]=!rb.sLocks[la.idx];
        } else {
          const ci=la.colIdx;
          if (!b.colTLocks[ci]) b.colTLocks[ci]=Array(colTD(b,ci).length).fill(false);
          b.colTLocks[ci][la.idx]=!b.colTLocks[ci][la.idx];
        }
        render(); return;
      }
    }

    // 2. Drag hit (depends on selMode)
    if (selectedId) {
      const b=blocks.find(b=>b.id===selectedId);
      if (b) {
        let h=null;
        if (selMode==='block')  h=hitColDivider(b,w.x,w.y);
        if (selMode==='column' && selColIdx!=null) h=hitRowDivider(b,selColIdx,w.x,w.y);
        if (selMode==='row') h=hitRowBandSDivider(b,w.x,w.y)||hitSharedRowDivider(b,w.x,w.y);
        if (h) { drag={blockId:b.id,...h}; return; }
      }
    }

    // 3. Selection click
    const blockId = hitBlock(w.x,w.y);
    if (blockId == null) {
      // Click on empty canvas — deselect
      selectedId=null; selColIdx=null; selRowIdx=null; render(); updateStatus(); return;
    }

    if (selMode==='block') {
      selectedId=blockId; selColIdx=null; selRowIdx=null;
    } else if (selMode==='column') {
      const b=blocks.find(b=>b.id===blockId);
      selectedId=blockId;
      selColIdx=hitColumn(b,w.x,w.y); selRowIdx=null;
    } else if (selMode==='row') {
      const b=blocks.find(b=>b.id===blockId);
      selectedId=blockId;
      const ci=hitColumn(b,w.x,w.y);
      selColIdx=ci;
      selRowIdx=(ci!=null)?hitRowInCol(b,ci,w.x,w.y):null;
    } else if (selMode==='unit') {
      const b=blocks.find(b=>b.id===blockId);
      selectedId=blockId;
      const ci=hitColumn(b,w.x,w.y);
      selColIdx=ci;
      selRowIdx=(ci!=null)?hitRowInCol(b,ci,w.x,w.y):null;
    }
    render(); updateStatus();
  }

  if (mode==='draw') {
    if (drawVerts.length>=3) {
      const fp=wpt(drawVerts[0]);
      if (Math.hypot(cx-fp.x,cy-fp.y)<12){finishDraw();return;}
    }
    drawVerts.push({x:w.x,y:w.y}); render();
  }

  if (mode==='baseline' && pendingBlock) {
    const ei=hitEdge(pendingBlock,w.x,w.y);
    if (ei>=0){pendingBlock.baseline=ei;openGridModal();}
  }
}

function onUp(e) { panning=false; drag=null; }

function onDbl(e) {
  if (mode==='draw' && drawVerts.length>=3){finishDraw();return;}

  // Column mode: double-click on a row divider → remove it; elsewhere → add one
  if (mode==='select' && selMode==='column' && selectedId!=null && selColIdx!=null) {
    const {w}=evCoords(e);
    const b=blocks.find(b=>b.id===selectedId);
    if (!b) return;
    const ci=selColIdx;

    // Check if double-clicking on an existing row divider → remove
    const thresh=8/scale;
    const sPos=[0,...b.sDivs,1];
    const s0=sPos[ci], s1=sPos[ci+1];
    const tDivs=colTD(b,ci);
    for (let ti=0;ti<tDivs.length;ti++) {
      const t=tDivs[ti];
      const p0=gp(b,s0,t), p1=gp(b,s1,t);
      for (let k=0;k<=8;k++) {
        const f=k/8;
        const p={x:p0.x+f*(p1.x-p0.x),y:p0.y+f*(p1.y-p0.y)};
        if (Math.hypot(p.x-w.x,p.y-w.y)<thresh) {
          b.colTDivs[ci].splice(ti,1);
          b.colTLocks[ci].splice(ti,1);
          render(); setStatus(`Removed row divider from column ${ci+1}`); return;
        }
      }
    }

    // Not on a divider → add one at the click t-position
    const info=blInfo(b);
    if (!ptInPoly(w.x,w.y,b.verts)) return;
    const t=((w.x-info.A.x)*info.vx+(w.y-info.A.y)*info.vy)/info.maxV;
    if (t<0.02||t>0.98) return;
    if (tDivs.some(v=>Math.abs(v-t)<0.02)) return;

    const insertIdx=b.colTDivs[ci].findIndex(v=>v>t);
    if (insertIdx===-1) {
      b.colTDivs[ci].push(t);
      b.colTLocks[ci].push(false);
    } else {
      b.colTDivs[ci].splice(insertIdx,0,t);
      b.colTLocks[ci].splice(insertIdx,0,false);
    }
    render(); setStatus(`Added row divider to column ${ci+1} (${b.colTDivs[ci].length+1} rows now)`);
  }

  // Row mode: add/remove VERTICAL sub-divider within the selected row band
  if (mode==='select' && selMode==='row' && selectedId!=null && selColIdx!=null && selRowIdx!=null) {
    const {w}=evCoords(e);
    const b=blocks.find(b=>b.id===selectedId);
    if (!b || !ptInPoly(w.x,w.y,b.verts)) return;

    const anchorTP=[0,...colTD(b,selColIdx),1];
    const t0=anchorTP[selRowIdx], t1=anchorTP[selRowIdx+1];
    // Only act if click is within this row band
    const info=blInfo(b);
    const tClick=((w.x-info.A.x)*info.vx+(w.y-info.A.y)*info.vy)/info.maxV;
    if (tClick<t0-0.01||tClick>t1+0.01) return;

    const rb=getOrCreateRowBand(b,t0,t1);
    const sClick=((w.x-info.A.x)*info.ux+(w.y-info.A.y)*info.uy)/info.len;
    const thresh=8/scale;

    // Check if clicking near an existing vertical sub-divider → remove it
    for (let si=0;si<rb.sDivs.length;si++) {
      const sv=rb.sDivs[si];
      for (let k=0;k<=8;k++) {
        const t=t0+(k/8)*(t1-t0);
        const p=gp(b,sv,t);
        if (Math.hypot(p.x-w.x,p.y-w.y)<thresh) {
          rb.sDivs.splice(si,1); rb.sLocks.splice(si,1);
          render(); setStatus('Vertical sub-divider removed — two units merged'); return;
        }
      }
    }

    // Add vertical sub-divider at clicked s-position
    if (sClick<0.02||sClick>0.98) return;
    if (rb.sDivs.some(v=>Math.abs(v-sClick)<0.02)) return;
    const insertIdx=rb.sDivs.findIndex(v=>v>sClick);
    if (insertIdx===-1){ rb.sDivs.push(sClick); rb.sLocks.push(false); }
    else { rb.sDivs.splice(insertIdx,0,sClick); rb.sLocks.splice(insertIdx,0,false); }
    render(); setStatus(`Row split vertically — ${rb.sDivs.length+1} sub-units in this row`);
  }
}

function onWheel(e) {
  e.preventDefault();
  const {cx,cy}=evCoords(e);
  const f=e.deltaY<0?1.12:1/1.12;
  panX=cx-f*(cx-panX); panY=cy-f*(cy-panY); scale*=f;
  zoomEl.textContent=Math.round(scale*100)+' %';
  render();
}

function evCoords(e) {
  const r=canvas.getBoundingClientRect();
  const cx=e.clientX-r.left, cy=e.clientY-r.top;
  return {cx,cy,w:c2w(cx,cy)};
}

// ─── Drag helpers ─────────────────────────────────────────────────────────────
// Proportional redistribution of one column's row dividers around index di.
function applyRowDrag(b, ci, di, rawT, EPS=0.012) {
  const tDivs  = b.colTDivs[ci];
  const tLocks = b.colTLocks[ci] || [];
  let topBound=0; const topIdxs=[];
  for (let j=di-1;j>=0;j--){if(tLocks[j]){topBound=tDivs[j];break;}topIdxs.unshift(j);}
  let bottomBound=1; const bottomIdxs=[];
  for (let j=di+1;j<tDivs.length;j++){if(tLocks[j]){bottomBound=tDivs[j];break;}bottomIdxs.push(j);}
  const newT=Math.max(topBound+EPS,Math.min(bottomBound-EPS,rawT));
  tDivs[di]=newT;
  const tStep=(newT-topBound)/(topIdxs.length+1);
  topIdxs.forEach((j,k)=>{tDivs[j]=topBound+(k+1)*tStep;});
  const bStep=(bottomBound-newT)/(bottomIdxs.length+1);
  bottomIdxs.forEach((j,k)=>{tDivs[j]=newT+(k+1)*bStep;});
}

// ─── Drag (proportional redistribution) ──────────────────────────────────────
function applyDrag(wx,wy) {
  const b=blocks.find(b=>b.id===drag.blockId);
  if (!b) return;
  const info=blInfo(b);
  const di=drag.idx, EPS=0.012;

  if (drag.axis==='col') {
    const sLocks=b.sLocks||[];
    const raw=((wx-info.A.x)*info.ux+(wy-info.A.y)*info.uy)/info.len;

    let leftBound=0; const leftIdxs=[];
    for (let j=di-1;j>=0;j--){if(sLocks[j]){leftBound=b.sDivs[j];break;}leftIdxs.unshift(j);}
    let rightBound=1; const rightIdxs=[];
    for (let j=di+1;j<b.sDivs.length;j++){if(sLocks[j]){rightBound=b.sDivs[j];break;}rightIdxs.push(j);}

    const newS=Math.max(leftBound+EPS,Math.min(rightBound-EPS,raw));
    b.sDivs[di]=newS;
    const lStep=(newS-leftBound)/(leftIdxs.length+1);
    leftIdxs.forEach((j,k)=>{b.sDivs[j]=leftBound+(k+1)*lStep;});
    const rStep=(rightBound-newS)/(rightIdxs.length+1);
    rightIdxs.forEach((j,k)=>{b.sDivs[j]=newS+(k+1)*rStep;});

  } else if (drag.axis === 'rowBandS') {
    // Drag a vertical sub-divider within a row band (left/right)
    const rb = getOrCreateRowBand(b, drag.t0, drag.t1);
    const di = drag.idx;
    const raw = ((wx-info.A.x)*info.ux+(wy-info.A.y)*info.uy)/info.len;
    const sLocks = rb.sLocks;
    let lBound=0; const lIdxs=[];
    for (let j=di-1;j>=0;j--){if(sLocks[j]){lBound=rb.sDivs[j];break;}lIdxs.unshift(j);}
    let rBound=1; const rIdxs=[];
    for (let j=di+1;j<rb.sDivs.length;j++){if(sLocks[j]){rBound=rb.sDivs[j];break;}rIdxs.push(j);}
    const newS=Math.max(lBound+EPS,Math.min(rBound-EPS,raw));
    rb.sDivs[di]=newS;
    const lStep=(newS-lBound)/(lIdxs.length+1);
    lIdxs.forEach((j,k)=>{rb.sDivs[j]=lBound+(k+1)*lStep;});
    const rStep=(rBound-newS)/(rIdxs.length+1);
    rIdxs.forEach((j,k)=>{rb.sDivs[j]=newS+(k+1)*rStep;});

  } else if (drag.colIdx != null) {
    // Row drag — single column (column mode)
    applyRowDrag(b, drag.colIdx, drag.idx,
      ((wx-info.A.x)*info.vx+(wy-info.A.y)*info.vy)/info.maxV, EPS);

  } else {
    // Shared row drag — moves the same t-value in ALL columns simultaneously (row mode)
    const rawT = ((wx-info.A.x)*info.vx+(wy-info.A.y)*info.vy)/info.maxV;
    for (let ci=0; ci<b.cols; ci++) {
      const td = b.colTDivs[ci];
      if (!td.length) continue;
      let bestDi=0, bestDist=Infinity;
      td.forEach((t,i)=>{ const d=Math.abs(t-drag.tBase); if(d<bestDist){bestDist=d;bestDi=i;} });
      if (bestDist < 0.15) applyRowDrag(b, ci, bestDi, rawT, EPS);
    }
  }
}

// ─── Drawing ──────────────────────────────────────────────────────────────────
function finishDraw() {
  if (drawVerts.length<3){drawVerts=[];render();return;}
  pendingBlock={id:nextId++, verts:[...drawVerts], baseline:null, cols:0,
                sDivs:[], sLocks:[], colTDivs:[], colTLocks:[]};
  drawVerts=[]; mode='baseline'; hoveredEdge=-1;
  render(); setStatus('Click an edge of the block to set it as the baseline for column alignment');
}

// ─── Grid modal ───────────────────────────────────────────────────────────────
function openGridModal() {
  document.getElementById('gridModal').classList.add('show');
  document.getElementById('inputCols').focus();

  document.getElementById('btnModalOk').onclick = () => {
    const cols=Math.max(1,parseInt(document.getElementById('inputCols').value)||2);
    const rows=Math.max(1,parseInt(document.getElementById('inputRows').value)||2);
    pendingBlock.cols    = cols;
    pendingBlock.sDivs   = Array.from({length:cols-1},(_,i)=>(i+1)/cols);
    pendingBlock.sLocks  = Array(cols-1).fill(false);
    pendingBlock.colTDivs    = Array.from({length:cols},()=>Array.from({length:rows-1},(_,i)=>(i+1)/rows));
    pendingBlock.colTLocks   = Array.from({length:cols},()=>Array(rows-1).fill(false));
    pendingBlock.rowBandSDivs = [];  // vertical sub-dividers per row band: [{t0,t1,sDivs,sLocks}]
    blocks.push(pendingBlock);
    selectedId=pendingBlock.id; selColIdx=null; selRowIdx=null;
    pendingBlock=null; mode='select';
    document.getElementById('gridModal').classList.remove('show');
    render(); updateStatus();
  };
  document.getElementById('btnModalCancel').onclick = cancelModal;
}

function cancelModal() {
  document.getElementById('gridModal').classList.remove('show');
  pendingBlock=null; setMode('select');
}

// ─── Toolbar ──────────────────────────────────────────────────────────────────
document.getElementById('imgInput').addEventListener('change', e=>{
  const f=e.target.files[0]; if(!f)return;
  const img=new Image();
  img.onload=()=>{
    bgImage=img;
    const sw=canvas.width/img.width, sh=canvas.height/img.height;
    scale=Math.min(sw,sh,1);
    panX=(canvas.width-img.width*scale)/2; panY=(canvas.height-img.height*scale)/2;
    zoomEl.textContent=Math.round(scale*100)+' %';
    render(); setStatus('Image loaded — use Draw Block to start mapping');
  };
  img.src=URL.createObjectURL(f); e.target.value='';
});

document.getElementById('btnDraw').addEventListener('click',()=>setMode('draw'));
document.getElementById('btnDelete').addEventListener('click',()=>{
  if (!selectedId) return;
  if (selMode==='column' && selColIdx!=null) {
    // Delete selected column if >1 column remains
    const b=blocks.find(b=>b.id===selectedId);
    if (b && b.cols>1) {
      b.cols--;
      b.sDivs.splice(selColIdx>0?selColIdx-1:0,1);
      b.sLocks.splice(selColIdx>0?selColIdx-1:0,1);
      b.colTDivs.splice(selColIdx,1);
      b.colTLocks.splice(selColIdx,1);
      selColIdx=null; render(); setStatus('Column deleted');
    }
  } else {
    blocks=blocks.filter(b=>b.id!==selectedId);
    selectedId=null; selColIdx=null; selRowIdx=null;
    render(); setStatus('Block deleted');
  }
});
document.getElementById('btnExport').addEventListener('click',exportGeoJSON);

// Level selector buttons
const lvlBtns = {
  block:  document.getElementById('btnLvlBlock'),
  column: document.getElementById('btnLvlCol'),
  row:    document.getElementById('btnLvlRow'),
  unit:   document.getElementById('btnLvlUnit'),
};
Object.entries(lvlBtns).forEach(([lvl,btn])=>{
  btn.addEventListener('click',()=>setSelMode(lvl));
});

function setSelMode(m) {
  selMode=m; selColIdx=null; selRowIdx=null;
  Object.entries(lvlBtns).forEach(([k,b])=>b.classList.toggle('active',k===m));
  updateStatus(); render();
}

function setMode(m) {
  if (mode==='baseline') pendingBlock=null;
  mode=m; drawVerts=[];
  document.getElementById('btnDraw').classList.toggle('active',m==='draw');
  canvas.style.cursor=m==='draw'?'crosshair':'default';
  updateStatus(); render();
}

function updateStatus() {
  if (mode==='draw') {
    setStatus('Click to place vertices — double-click or click first vertex to close (Esc = cancel)');
  } else if (mode==='select') {
    if (!selectedId) {
      setStatus(`[${selMode.toUpperCase()}] Click a block to select · D = draw · Del = delete`);
    } else if (selMode==='block') {
      setStatus('Block selected — drag column handles to resize · Switch to Column mode to edit rows per column');
    } else if (selMode==='column') {
      setStatus(selColIdx!=null
        ? `Column ${selColIdx+1} selected — drag row handles to resize · dbl-click to add/remove rows · Del = delete column`
        : 'Click inside a column to select it');
    } else if (selMode==='row') {
      setStatus(selRowIdx!=null
        ? `Row ${selRowIdx+1} of column ${selColIdx+1} selected`
        : 'Click inside a row to select it');
    } else if (selMode==='unit') {
      setStatus(selRowIdx!=null
        ? `Unit selected — column ${selColIdx+1}, row ${selRowIdx+1}`
        : 'Click a unit to select it');
    }
  }
}

function setStatus(msg){statusEl.textContent=msg;}

// ─── Keyboard ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if (e.target.tagName==='INPUT') return;
  const k=e.key;
  if (k==='1') setSelMode('block');
  if (k==='2') setSelMode('column');
  if (k==='3') setSelMode('row');
  if (k==='4') setSelMode('unit');
  if (k==='d'||k==='D') setMode('draw');
  if (k==='Escape') {
    if (mode==='draw'){drawVerts=[];setMode('select');return;}
    if (mode==='baseline'){cancelModal();return;}
    selectedId=null; selColIdx=null; selRowIdx=null; render(); updateStatus();
  }
  if ((k==='Delete'||k==='Backspace')&&selectedId)
    document.getElementById('btnDelete').click();
});

// ─── GeoJSON export ───────────────────────────────────────────────────────────
function exportGeoJSON() {
  const features=[];
  for (const b of blocks) {
    const bcoords=[...b.verts.map(v=>[v.x,v.y]),[b.verts[0].x,b.verts[0].y]];
    features.push({type:'Feature',id:`block-${b.id}`,
      properties:{type:'block',id:b.id},
      geometry:{type:'Polygon',coordinates:[bcoords]}});

    if (b.cols && b.baseline!=null && b.colTDivs) {
      const sp=[0,...b.sDivs,1];
      let num=1;
      for (let ci=0;ci<b.cols;ci++) {
        const s0=sp[ci], s1=sp[ci+1];
        const tp=[0,...colTD(b,ci),1];
        for (let ri=0;ri<tp.length-1;ri++) {
          const t0=tp[ri], t1=tp[ri+1];
          // Check for vertical sub-dividers in this row band
          const rb=(b.rowBandSDivs||[]).find(r=>Math.abs(r.t0-t0)<0.005&&Math.abs(r.t1-t1)<0.005);
          const subS = rb ? [s0,...rb.sDivs.filter(sv=>sv>s0&&sv<s1),s1] : [s0,s1];
          for (let ssi=0;ssi<subS.length-1;ssi++) {
            const ss0=subS[ssi], ss1=subS[ssi+1];
            const corners=[gp(b,ss0,t0),gp(b,ss1,t0),gp(b,ss1,t1),gp(b,ss0,t1)];
            features.push({type:'Feature',id:`unit-${b.id}-${num}`,
              properties:{type:'unit',blockId:b.id,colIdx:ci,rowIdx:ri,subColIdx:ssi,unitNumber:num},
              geometry:{type:'Polygon',coordinates:[[...corners.map(p=>[p.x,p.y]),[corners[0].x,corners[0].y]]]}});
            num++;
          }
        }
      }
    }
  }
  const blob=new Blob([JSON.stringify({type:'FeatureCollection',features},null,2)],
                      {type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='blocks.geojson'; a.click();
}

// ─── Canvas resize ────────────────────────────────────────────────────────────
function resizeCanvas() {
  canvas.width=wrap.clientWidth; canvas.height=wrap.clientHeight; render();
}
new ResizeObserver(resizeCanvas).observe(wrap);
resizeCanvas();
setSelMode('block');
setMode('select');
</script>
